<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="稽古プレイヤー">
<title>稽古プレイヤー</title>
<style>
:root {
  --red:    #ff3b30;
  --green:  #30d158;
  --border: rgba(255,255,255,0.12);
  --glass:  rgba(10,10,12,0.82);
  --dim:    rgba(255,255,255,0.4);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%; height: 100%; height: 100dvh;
  background: #000; color: #fff;
  font-family: 'Helvetica Neue', 'Hiragino Sans', system-ui, sans-serif;
  overflow: hidden;
}

/* ══ 縦向き案内 ══ */
.portrait-notice {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.portrait-notice-icon { font-size: 52px; }
.portrait-notice-text { font-size: 15px; color: var(--dim); text-align: center; line-height: 1.7; }
@media (orientation: portrait) { .portrait-notice { display: flex; } }

/* ══ ルート：ポジショニング基準 ══ */
.app {
  position: relative;
  width: 100%; height: 100%; height: 100dvh;
  overflow: hidden;
  background: #000;
}

/* ══════════════════════════════════════════
   遅延ミラー：フルスクリーン（背景）
   ══════════════════════════════════════════ */
.cam-bg {
  position: absolute;
  inset: 0;
  background: #000;
  z-index: 1;
}
#liveVideo {
  position: absolute; width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
}
#cam-canvas {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;   /* 余白は黒 */
}

/* カメラ未起動オーバーレイ */
.cam-ov {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: rgba(0,0,0,0.88);
  z-index: 2;
}
.cam-ov.gone { display: none; }
.cam-start {
  padding: 13px 36px; background: var(--green); border: none;
  border-radius: 100px; color: #000; font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
.cam-ov-sub { font-size: 12px; color: var(--dim); text-align: center; }
.cam-err    { color: #ff7070; font-size: 12px; }

/* 遅延バッジ */
.delay-badge {
  position: absolute; top: 10px; right: 12px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 5px 12px; border-radius: 100px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
  display: none; align-items: center; gap: 6px;
  z-index: 5;
}
.delay-badge.show { display: flex; }
.delay-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ══ カメラ操作バー（下端） ══ */
.cam-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 46px;
  padding: 0 14px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--glass);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  z-index: 10;
}
.cbar-lbl {
  font-size: 9px; font-weight: 800; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--dim); white-space: nowrap;
}
.cbtn {
  padding: 5px 11px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: #fff; font-size: 11px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap;
}
.cbtn:active { opacity: 0.65; }
.cbtn.active { background: rgba(255,59,48,0.22); border-color: var(--red); color: #ff6b62; }
.cbtn.go   { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }
.cbtn.stop { background: rgba(255,255,255,0.1); border-color: #555; }

input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; background: rgba(255,255,255,0.18); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  background: #fff; border-radius: 50%; cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; background: #fff; border-radius: 50%;
  cursor: pointer; border: none; box-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
.delay-val {
  font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: #fff; min-width: 28px; text-align: right;
}

/* ══════════════════════════════════════════
   YouTube 小窓（左上フロート）
   ══════════════════════════════════════════ */
.yt-window {
  position: absolute;
  top: 10px;
  left: 10px;
  /* 幅：小さめ固定。clampでデバイス差吸収 */
  width: clamp(200px, 27vw, 320px);
  background: rgba(8,8,10,0.88);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  z-index: 30;
  box-shadow: 0 8px 32px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.06);
}

/* ヘッダー */
.yt-win-hdr {
  display: flex; align-items: center; gap: 5px;
  padding: 0 8px;
  height: 30px;
  background: rgba(18,18,20,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.yt-win-title {
  font-size: 9px; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--dim); flex: 1;
}
.ywbtn {
  padding: 3px 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  color: #fff; font-size: 10px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap;
}
.ywbtn:active { opacity: 0.65; }
.ywbtn.active { background: rgba(255,59,48,0.25); border-color: var(--red); color: #ff6b62; }

/* 動画エリア */
.yt-win-video {
  position: relative;
  aspect-ratio: 16 / 9;
  background: #000;
  overflow: hidden;
}
#yt-player { width: 100%; height: 100%; }
#yt-player iframe { width: 100% !important; height: 100% !important; }

.yt-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  background: #060608; cursor: pointer;
}
.yt-ph.gone { display: none; }
.yt-ph-icon { font-size: 22px; opacity: 0.45; }
.yt-ph-text { font-size: 10px; color: var(--dim); text-align: center; line-height: 1.5; }

/* プログレスバー */
.yt-win-prog {
  display: flex; align-items: center; gap: 5px;
  padding: 0 7px;
  height: 30px;
  background: rgba(18,18,20,0.95);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.yt-time {
  font-size: 10px; font-variant-numeric: tabular-nums;
  color: var(--dim); white-space: nowrap;
}
.yt-prog-track {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px; cursor: pointer; position: relative;
}
.yt-prog-region {
  position: absolute; top: 0; height: 100%;
  background: rgba(255,59,48,0.3); border-radius: 2px; pointer-events: none;
}
.yt-prog-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--red); border-radius: 2px; pointer-events: none; width: 0%;
}
.yt-ab-badge {
  font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
  color: var(--dim); white-space: nowrap;
}
.yt-ab-badge.on { color: var(--red); }

/* ══ URL / AB設定モーダル ══ */
.modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: #1c1c1e;
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 16px; padding: 20px;
  width: min(360px, 88vw);
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.modal-in {
  width: 100%; padding: 9px 12px;
  background: #2c2c2e; border: 1px solid #3a3a3c;
  border-radius: 9px; color: #fff; font-size: 14px; font-family: inherit;
  outline: none; margin-bottom: 10px;
}
.modal-in:focus { border-color: var(--red); }
.modal-in::placeholder { color: #555; }
.modal-ab-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.modal-ab-lbl { font-size: 10px; font-weight: 800; color: var(--dim); letter-spacing: 0.12em; }
.modal-ab-in {
  width: 80px; padding: 8px 10px;
  background: #2c2c2e; border: 1px solid #3a3a3c;
  border-radius: 9px; color: #fff; font-size: 14px;
  text-align: center; font-family: inherit; outline: none;
}
.modal-ab-in:focus { border-color: var(--red); }
.modal-ab-sep { color: var(--dim); font-size: 12px; flex: 1; text-align: center; }
.modal-hint { font-size: 10px; color: #555; margin-bottom: 14px; line-height: 1.5; }
.modal-err { color: #ff7070; font-size: 11px; min-height: 14px; margin-bottom: 10px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btn {
  flex: 1; padding: 10px; border: 1px solid var(--border);
  border-radius: 9px; background: rgba(255,255,255,0.07); color: #fff;
  font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer;
}
.modal-btn.primary { background: var(--red); border-color: var(--red); font-weight: 700; }
.modal-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- 縦向き案内 -->
<div class="portrait-notice">
  <div class="portrait-notice-icon">📱↔️</div>
  <div class="portrait-notice-text">スマホを横向きにしてください<br>Please rotate to landscape</div>
</div>

<!-- ══ URL / AB 設定モーダル ══ -->
<div class="modal-bg" id="url-modal" onclick="modalBgClick(event)">
  <div class="modal-box">
    <div class="modal-title">📺 YouTube 動画を設定</div>
    <input type="text" class="modal-in" id="url-input"
      placeholder="YouTube URL または 動画ID" />
    <div class="modal-ab-row">
      <span class="modal-ab-lbl">A</span>
      <input type="text" class="modal-ab-in" id="start-time" value="0:00" />
      <span class="modal-ab-sep">→ AB 区間 →</span>
      <input type="text" class="modal-ab-in" id="end-time" placeholder="終端" />
      <span class="modal-ab-lbl">B</span>
    </div>
    <div class="modal-hint">時間は「1:30」または秒数「90」で入力。B点を空欄にすると動画の終わりまで。</div>
    <div class="modal-err" id="yt-err"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="loadVideo()">読み込む</button>
    </div>
  </div>
</div>

<!-- ══ アプリ本体 ══ -->
<div class="app">

  <!-- ── 遅延ミラー（フルスクリーン背景） ── -->
  <div class="cam-bg">
    <video id="liveVideo" autoplay playsinline muted></video>
    <canvas id="cam-canvas"></canvas>

    <div class="cam-ov" id="cam-ov">
      <button class="cam-start" onclick="toggleCamera()">カメラ開始</button>
      <div class="cam-ov-sub">遅延再生で自分のフォームをチェック</div>
      <div class="cam-err" id="cam-err"></div>
    </div>
  </div>

  <!-- 遅延バッジ（右上） -->
  <div class="delay-badge" id="delay-badge">
    <span class="delay-dot"></span>
    <span id="delay-badge-txt">10s 遅延</span>
  </div>

  <!-- ── YouTube 小窓（左上） ── -->
  <div class="yt-window">
    <div class="yt-win-hdr">
      <span class="yt-win-title">📺 見本</span>
      <button class="ywbtn" onclick="openModal()">URL</button>
      <button class="ywbtn" id="loop-btn" onclick="toggleLoop()">AB</button>
    </div>

    <div class="yt-win-video">
      <div id="yt-player"></div>
      <div class="yt-ph" id="yt-ph" onclick="openModal()">
        <div class="yt-ph-icon">▶</div>
        <div class="yt-ph-text">タップして<br>動画を読み込む</div>
      </div>
    </div>

    <div class="yt-win-prog">
      <span class="yt-time" id="cur-time">0:00</span>
      <div class="yt-prog-track" id="prog-track" onclick="seekByClick(event)">
        <div class="yt-prog-region" id="prog-region"></div>
        <div class="yt-prog-fill"   id="prog-fill"></div>
      </div>
      <span class="yt-time" id="dur-label">--:--</span>
      <span class="yt-ab-badge" id="ab-badge">AB</span>
    </div>
  </div>

  <!-- ── カメラ操作バー（下端） ── -->
  <div class="cam-bar">
    <span class="cbar-lbl">🪞 稽古</span>
    <button class="cbtn active" id="mirror-btn" onclick="toggleMirror()">反転 ON</button>
    <button class="cbtn" onclick="switchCamera()">カメラ切替</button>
    <span class="cbar-lbl" style="margin-left:8px;">遅延</span>
    <input type="range" id="delay-slider" min="2" max="30" step="1" value="10" />
    <span class="delay-val" id="delay-val">10s</span>
    <button class="cbtn go" id="cam-btn" onclick="toggleCamera()">● 開始</button>
  </div>

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════
   YouTube IFrame API
   ═══════════════════════════════════════ */
(function(){
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

var ytPlayer, ytTimer;
var ytDuration = 0;
var ytLooping  = false;

function onYouTubeIframeAPIReady() { /* ready */ }

function extractId(raw) {
  raw = (raw || '').trim();
  var ps = [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (var i = 0; i < ps.length; i++) {
    var m = raw.match(ps[i]);
    if (m) return m[1];
  }
  return null;
}

/* ── モーダル ── */
function openModal() {
  document.getElementById('url-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('url-input').focus(); }, 80);
}
function closeModal() {
  document.getElementById('url-modal').classList.remove('open');
}
function modalBgClick(e) {
  if (e.target === document.getElementById('url-modal')) closeModal();
}

/* ── 動画読み込み ── */
function loadVideo() {
  var vid = extractId(document.getElementById('url-input').value);
  var errEl = document.getElementById('yt-err');
  if (!vid) { errEl.textContent = '有効なURLまたは動画IDを入力してください'; return; }
  errEl.textContent = '';
  document.getElementById('yt-ph').classList.add('gone');
  closeModal();

  if (ytPlayer && ytPlayer.loadVideoById) {
    ytPlayer.loadVideoById(vid);
  } else {
    ytPlayer = new YT.Player('yt-player', {
      videoId: vid,
      playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
      events: { onReady: onYTReady, onStateChange: onYTState }
    });
  }
}

function onYTReady() {
  /* プレイヤー準備完了後、duration が取れるまで少し待つ */
  var poll = setInterval(function() {
    var d = ytPlayer.getDuration();
    if (d > 0) {
      ytDuration = d;
      document.getElementById('dur-label').textContent = fmtTime(d);
      clearInterval(poll);
    }
  }, 300);
  startYTMonitor();
}

function onYTState(e) {
  /* PLAYING になったら duration を取得 */
  if (e.data === YT.PlayerState.PLAYING) {
    var d = ytPlayer.getDuration();
    if (d > 0) {
      ytDuration = d;
      document.getElementById('dur-label').textContent = fmtTime(d);
      updateRegion();
    }
  }
}

/* ── AB リピート ── */
function toggleLoop() {
  ytLooping = !ytLooping;
  var btn   = document.getElementById('loop-btn');
  var badge = document.getElementById('ab-badge');
  btn.classList.toggle('active', ytLooping);
  btn.textContent = ytLooping ? 'AB ON' : 'AB';
  badge.textContent = ytLooping ? 'AB ON' : 'AB';
  badge.classList.toggle('on', ytLooping);

  if (ytLooping && ytPlayer) {
    var st = parseTime(document.getElementById('start-time').value);
    ytPlayer.seekTo(st, true);
    ytPlayer.playVideo();
  }
  updateRegion();
}

/* ── 200ms 監視（進捗表示 + ABループ判定） ── */
function startYTMonitor() {
  if (ytTimer) clearInterval(ytTimer);
  ytTimer = setInterval(function() {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;

    /* duration を常に最新に */
    var d = ytPlayer.getDuration();
    if (d > 0) ytDuration = d;

    var cur = ytPlayer.getCurrentTime();

    /* UI 更新 */
    document.getElementById('cur-time').textContent = fmtTime(cur);
    if (ytDuration > 0) {
      document.getElementById('prog-fill').style.width = (cur / ytDuration * 100) + '%';
      document.getElementById('dur-label').textContent = fmtTime(ytDuration);
    }

    /* ABループ判定 */
    if (!ytLooping || ytDuration <= 0) return;

    var st    = parseTime(document.getElementById('start-time').value);
    var enRaw = document.getElementById('end-time').value.trim();
    var en    = enRaw ? parseTime(enRaw) : ytDuration;
    if (!en || en > ytDuration) en = ytDuration;

    /* 有効な区間で、終了点を超えたらA点に戻す */
    if (st < en && cur >= en) {
      ytPlayer.seekTo(st, true);
      ytPlayer.playVideo();
    }
  }, 200);
}

/* ── プログレスバークリックでシーク ── */
function seekByClick(e) {
  if (!ytPlayer || !ytDuration) return;
  var r = document.getElementById('prog-track').getBoundingClientRect();
  var ratio = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  ytPlayer.seekTo(ratio * ytDuration, true);
}

/* ── AB区間の色帯を更新 ── */
function updateRegion() {
  if (!ytDuration) return;
  var st    = parseTime(document.getElementById('start-time').value);
  var enRaw = document.getElementById('end-time').value.trim();
  var en    = enRaw ? parseTime(enRaw) : ytDuration;
  if (!en || en > ytDuration) en = ytDuration;
  var w = Math.max(0, (en - st) / ytDuration * 100);
  var reg = document.getElementById('prog-region');
  reg.style.left  = (st / ytDuration * 100) + '%';
  reg.style.width = w + '%';
}
['start-time', 'end-time'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', updateRegion);
});
document.getElementById('url-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadVideo();
});


/* ═══════════════════════════════════════
   遅延ミラー
   ═══════════════════════════════════════ */
var camStream   = null;
var camRunning  = false;
var capInterval = null;
var rafId       = null;
var frameBuf    = [];
var delaySec    = 10;
var mirrored    = true;
var facingMode  = 'user';
var CAPTURE_MS  = 80;

var liveVideo = document.getElementById('liveVideo');
var camCanvas = document.getElementById('cam-canvas');
var camCtx    = camCanvas.getContext('2d');
var capCanvas = document.createElement('canvas');
var capCtx    = capCanvas.getContext('2d');

function resizeCam() {
  var r = camCanvas.getBoundingClientRect();
  camCanvas.width  = Math.round(r.width)  || 1;
  camCanvas.height = Math.round(r.height) || 1;
}
window.addEventListener('resize', resizeCam);
requestAnimationFrame(function(){ requestAnimationFrame(resizeCam); });

function toggleMirror() {
  mirrored = !mirrored;
  var btn = document.getElementById('mirror-btn');
  btn.classList.toggle('active', mirrored);
  btn.textContent = mirrored ? '反転 ON' : '反転';
}

function switchCamera() {
  if (!camRunning) return;
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  stopCamera(); startCamera();
}

function toggleCamera() {
  camRunning ? stopCamera() : startCamera();
}

async function startCamera() {
  document.getElementById('cam-err').textContent = '';
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: {ideal:1280}, height: {ideal:720} },
      audio: false
    });
    liveVideo.srcObject = camStream;
    await liveVideo.play();
    frameBuf = [];
    resizeCam();
    capInterval = setInterval(captureFrame, CAPTURE_MS);
    rafId = requestAnimationFrame(drawLoop);
    camRunning = true;

    document.getElementById('cam-ov').classList.add('gone');
    document.getElementById('delay-badge').classList.add('show');
    var btn = document.getElementById('cam-btn');
    btn.textContent = '■ 停止'; btn.className = 'cbtn stop';
  } catch (err) {
    var msg = 'カメラを起動できませんでした';
    if (err.name === 'NotAllowedError')  msg = 'カメラの許可が必要です';
    if (err.name === 'NotFoundError')    msg = 'カメラが見つかりません';
    document.getElementById('cam-err').textContent = msg;
  }
}

function stopCamera() {
  camRunning = false;
  if (capInterval) { clearInterval(capInterval); capInterval = null; }
  if (rafId)       { cancelAnimationFrame(rafId); rafId = null; }
  if (camStream)   { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  liveVideo.srcObject = null;
  frameBuf = [];
  camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
  document.getElementById('cam-ov').classList.remove('gone');
  document.getElementById('delay-badge').classList.remove('show');
  var btn = document.getElementById('cam-btn');
  btn.textContent = '● 開始'; btn.className = 'cbtn go';
}

function captureFrame() {
  if (!camRunning) return;
  var vw = liveVideo.videoWidth, vh = liveVideo.videoHeight;
  if (!vw || !vh) return;
  var maxDim = 480;
  if (vw >= vh) { capCanvas.width = maxDim; capCanvas.height = Math.round(maxDim * vh / vw); }
  else          { capCanvas.height = maxDim; capCanvas.width = Math.round(maxDim * vw / vh); }
  capCtx.drawImage(liveVideo, 0, 0, capCanvas.width, capCanvas.height);
  var img = new Image();
  img.src = capCanvas.toDataURL('image/jpeg', 0.65);
  frameBuf.push({ t: Date.now(), img: img });
  var cutoff = Date.now() - (delaySec + 6) * 1000;
  while (frameBuf.length && frameBuf[0].t < cutoff) frameBuf.shift();
}

function drawLoop() {
  rafId = requestAnimationFrame(drawLoop);
  if (!camRunning || !frameBuf.length) return;
  var target = Date.now() - delaySec * 1000;
  var frame  = frameBuf[0];
  for (var i = frameBuf.length - 1; i >= 0; i--) {
    if (frameBuf[i].t <= target) { frame = frameBuf[i]; break; }
  }
  if (!frame || !frame.img.complete || !frame.img.naturalWidth) return;
  var cw = camCanvas.width, ch = camCanvas.height;
  if (!cw || !ch) return;
  var fw = frame.img.naturalWidth, fh = frame.img.naturalHeight;
  var scale = Math.min(cw / fw, ch / fh);
  camCtx.clearRect(0, 0, cw, ch);
  camCtx.save();
  camCtx.translate(cw / 2, ch / 2);
  if (mirrored) camCtx.scale(-1, 1);
  camCtx.drawImage(frame.img, -fw * scale / 2, -fh * scale / 2, fw * scale, fh * scale);
  camCtx.restore();
}

document.getElementById('delay-slider').addEventListener('input', function(e) {
  delaySec = parseInt(e.target.value);
  document.getElementById('delay-val').textContent      = delaySec + 's';
  document.getElementById('delay-badge-txt').textContent = delaySec + 's 遅延';
});

window.addEventListener('beforeunload', stopCamera);


/* ═══════════════════════════════════════
   ユーティリティ
   ═══════════════════════════════════════ */
function parseTime(str) {
  if (!str) return 0;
  str = str.trim();
  if (/^\d+(\.\d+)?$/.test(str)) return parseFloat(str);
  var p = str.split(':').map(Number);
  if (p.length === 2) return p[0] * 60 + p[1];
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return 0;
}
function fmtTime(sec) {
  sec = Math.floor(sec || 0);
  var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  return h > 0 ? h + ':' + pad(m) + ':' + pad(s) : m + ':' + pad(s);
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
