<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="稽古プレイヤー">
<title>稽古プレイヤー</title>
<style>
:root {
  --red:    #ff3b30;
  --green:  #30d158;
  --border: rgba(255,255,255,0.1);
  --ctrl:   rgba(12,12,14,0.97);
  --dim:    rgba(255,255,255,0.38);
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%; height: 100%; height: 100dvh;
  background: #000; color: #fff;
  font-family: 'Helvetica Neue', 'Hiragino Sans', system-ui, sans-serif;
  overflow: hidden;
}

/* ══════════════════════════════
   縦向きの場合は回転案内を表示
   ══════════════════════════════ */
.portrait-notice {
  display: none;
  position: fixed; inset: 0; z-index: 999;
  background: #000;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.portrait-notice-icon { font-size: 52px; }
.portrait-notice-text { font-size: 15px; color: var(--dim); text-align: center; line-height: 1.7; }
@media (orientation: portrait) {
  .portrait-notice { display: flex; }
}

/* ══════════════════════════════
   アプリ本体：横画面・左右2分割
   ══════════════════════════════ */
.app {
  display: flex;
  flex-direction: row;
  width: 100%; height: 100%; height: 100dvh;
  /* iPhone ノッチ対応 */
  padding-left:  env(safe-area-inset-left,  0px);
  padding-right: env(safe-area-inset-right, 0px);
}

.panel {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.panel + .panel {
  border-left: 2px solid rgba(255,255,255,0.15);
}

/* ── ヘッダーバー ── */
.hbar {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  height: 38px;
  background: var(--ctrl);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.hbar-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--dim); flex: 1;
}
.hbtn {
  padding: 4px 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: #fff; font-size: 11px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  white-space: nowrap; transition: background .15s, border-color .15s;
}
.hbtn:active { opacity: 0.7; }
.hbtn.active { background: var(--red); border-color: var(--red); }
.hbtn.go     { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }
.hbtn.stop   { background: #2a2a2a; border-color: #444; }

/* ── YouTube 映像エリア ── */
.yt-area {
  flex: 1; min-height: 0;
  position: relative; background: #000; overflow: hidden;
}
#yt-player { width: 100%; height: 100%; }
#yt-player iframe { width: 100% !important; height: 100% !important; }

.yt-ph {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: #080808;
  cursor: pointer;
}
.yt-ph.gone { display: none; }
.yt-ph-icon { font-size: 30px; opacity: 0.45; }
.yt-ph-text { font-size: 12px; color: var(--dim); text-align: center; line-height: 1.6; }
.yt-ph-hint {
  padding: 8px 18px; background: rgba(255,255,255,0.08);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 11px; color: #aaa; margin-top: 4px;
}

/* ── YouTube プログレスバー ── */
.yt-progress {
  height: 38px; flex-shrink: 0;
  background: var(--ctrl); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 7px; padding: 0 10px;
}
.tlabel {
  font-size: 11px; font-variant-numeric: tabular-nums;
  color: var(--dim); white-space: nowrap;
}
.prog-track {
  flex: 1; height: 5px;
  background: rgba(255,255,255,0.12);
  border-radius: 3px; cursor: pointer; position: relative;
}
.prog-region {
  position: absolute; top: 0; height: 100%;
  background: rgba(255,59,48,0.3); border-radius: 3px; pointer-events: none;
}
.prog-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--red); border-radius: 3px; pointer-events: none; width: 0%;
}
.ab-badge {
  font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
  color: var(--dim); white-space: nowrap;
}
.ab-badge.on { color: var(--red); }

/* ── カメラ映像エリア ── */
.cam-area {
  flex: 1; min-height: 0;
  position: relative; background: #000; overflow: hidden;
}
#liveVideo {
  position: absolute; width: 1px; height: 1px;
  opacity: 0; pointer-events: none;
}
#cam-canvas { display: block; width: 100%; height: 100%; }

.cam-ov {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: rgba(0,0,0,0.9); z-index: 5;
}
.cam-ov.gone { display: none; }
.cam-start {
  padding: 11px 30px; background: var(--green); border: none;
  border-radius: 100px; color: #000; font-size: 14px; font-weight: 700;
  font-family: inherit; cursor: pointer;
}
.cam-ov-sub { font-size: 11px; color: var(--dim); text-align: center; }
.cam-err { color: #ff7070; font-size: 11px; }

.delay-ov {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 4px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  display: none; align-items: center; gap: 5px; z-index: 4;
}
.delay-ov.show { display: flex; }
.delay-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--red); animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── 遅延スライダーバー ── */
.delay-bar {
  height: 38px; flex-shrink: 0;
  background: var(--ctrl); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 12px;
}
.delay-bar-lbl {
  font-size: 9px; font-weight: 800; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--dim); white-space: nowrap;
}
input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  background: #fff; border-radius: 50%; cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
input[type=range]::-moz-range-thumb {
  width: 20px; height: 20px; background: #fff; border-radius: 50%;
  cursor: pointer; border: none; box-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
.delay-val {
  font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: #fff; min-width: 30px; text-align: right;
}

/* ══════════════════════════════
   URL設定モーダル
   ══════════════════════════════ */
.modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: #1c1c1e;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 20px;
  width: min(380px, 90vw);
}
.modal-title {
  font-size: 14px; font-weight: 700; margin-bottom: 14px;
  color: #fff; letter-spacing: 0.03em;
}
.modal-input {
  width: 100%; padding: 9px 12px;
  background: #2c2c2e; border: 1px solid #3a3a3c;
  border-radius: 9px; color: #fff; font-size: 14px; font-family: inherit;
  outline: none; margin-bottom: 10px;
}
.modal-input:focus { border-color: var(--red); }
.modal-input::placeholder { color: #555; }

.modal-ab {
  display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
}
.modal-ab-lbl { font-size: 10px; font-weight: 800; color: var(--dim); letter-spacing: 0.12em; }
.modal-ab-in {
  width: 70px; padding: 7px 8px;
  background: #2c2c2e; border: 1px solid #3a3a3c;
  border-radius: 9px; color: #fff; font-size: 13px;
  text-align: center; font-family: inherit; outline: none;
}
.modal-ab-in:focus { border-color: var(--red); }
.modal-ab-sep { color: var(--dim); }
.modal-err { color: #ff7070; font-size: 11px; min-height: 14px; margin-bottom: 10px; }

.modal-btns { display: flex; gap: 8px; }
.modal-btn {
  flex: 1; padding: 10px;
  border: 1px solid var(--border); border-radius: 9px;
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer;
}
.modal-btn.primary {
  background: var(--red); border-color: var(--red);
  font-weight: 700;
}
.modal-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- ── 縦向き案内 ── -->
<div class="portrait-notice">
  <div class="portrait-notice-icon">📱↔️</div>
  <div class="portrait-notice-text">スマホを横向きにしてください<br>Please rotate to landscape</div>
</div>

<!-- ══════════════════════════════════════════
     URL 設定モーダル
     ══════════════════════════════════════════ -->
<div class="modal-bg" id="url-modal" onclick="modalBgClick(event)">
  <div class="modal-box">
    <div class="modal-title">📺 YouTube 動画を設定</div>
    <input type="text" class="modal-input" id="url-input"
      placeholder="YouTube URL または 動画ID" />
    <div class="modal-ab">
      <span class="modal-ab-lbl">A</span>
      <input type="text" class="modal-ab-in" id="start-time" value="0:00" placeholder="0:00" />
      <span class="modal-ab-sep">→</span>
      <input type="text" class="modal-ab-in" id="end-time" placeholder="終端 (省略可)" />
      <span class="modal-ab-lbl">B</span>
    </div>
    <div class="modal-err" id="yt-err"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="loadVideo()">読み込む</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     アプリ本体
     ══════════════════════════════════════════ -->
<div class="app">

  <!-- ═══ 左パネル：YouTube 見本 ═══ -->
  <div class="panel">

    <div class="hbar">
      <span class="hbar-title">📺 見本</span>
      <button class="hbtn" onclick="openModal()">URL 設定</button>
      <button class="hbtn" id="loop-btn" onclick="toggleLoop()">AB リピート</button>
    </div>

    <div class="yt-area">
      <div id="yt-player"></div>
      <div class="yt-ph" id="yt-ph" onclick="openModal()">
        <div class="yt-ph-icon">▶</div>
        <div class="yt-ph-text">見本動画を読み込む</div>
        <div class="yt-ph-hint">タップして URL を入力</div>
      </div>
    </div>

    <div class="yt-progress">
      <span class="tlabel" id="cur-time">0:00</span>
      <div class="prog-track" id="prog-track" onclick="seekByClick(event)">
        <div class="prog-region" id="prog-region"></div>
        <div class="prog-fill"   id="prog-fill"></div>
      </div>
      <span class="tlabel" id="dur-label">--:--</span>
      <span class="ab-badge" id="ab-badge">AB</span>
    </div>

  </div><!-- /left panel -->

  <!-- ═══ 右パネル：遅延ミラー 稽古 ═══ -->
  <div class="panel">

    <div class="hbar">
      <span class="hbar-title">🪞 稽古</span>
      <button class="hbtn" id="mirror-btn" onclick="toggleMirror()">反転</button>
      <button class="hbtn" onclick="switchCamera()">カメラ切替</button>
      <button class="hbtn go" id="cam-btn" onclick="toggleCamera()">● 開始</button>
    </div>

    <div class="cam-area">
      <video id="liveVideo" autoplay playsinline muted></video>
      <canvas id="cam-canvas"></canvas>
      <div class="cam-ov" id="cam-ov">
        <button class="cam-start" onclick="toggleCamera()">カメラ開始</button>
        <div class="cam-ov-sub">遅延再生で自分のフォームをチェック</div>
        <div class="cam-err" id="cam-err"></div>
      </div>
      <div class="delay-ov" id="delay-ov">
        <span class="delay-dot"></span>
        <span id="delay-ov-txt">10s 遅延</span>
      </div>
    </div>

    <div class="delay-bar">
      <span class="delay-bar-lbl">遅延</span>
      <input type="range" id="delay-slider" min="2" max="30" step="1" value="10" />
      <span class="delay-val" id="delay-val">10s</span>
    </div>

  </div><!-- /right panel -->

</div><!-- /app -->

<script>
/* ═══════════════════════════════════════════════
   YouTube IFrame API
   ═══════════════════════════════════════════════ */
(function(){
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

var ytPlayer, ytTimer;
var ytDuration = 0;
var ytLooping  = false;

function onYouTubeIframeAPIReady() { /* ready */ }

/* URL → 動画ID */
function extractId(raw) {
  raw = (raw || '').trim();
  var ps = [
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (var i = 0; i < ps.length; i++) {
    var m = raw.match(ps[i]);
    if (m) return m[1];
  }
  return null;
}

/* モーダル操作 */
function openModal() {
  document.getElementById('url-modal').classList.add('open');
  setTimeout(function(){ document.getElementById('url-input').focus(); }, 100);
}
function closeModal() {
  document.getElementById('url-modal').classList.remove('open');
}
function modalBgClick(e) {
  if (e.target === document.getElementById('url-modal')) closeModal();
}

/* 動画読み込み */
function loadVideo() {
  var vid = extractId(document.getElementById('url-input').value);
  var errEl = document.getElementById('yt-err');
  if (!vid) { errEl.textContent = '有効な URL または動画ID を入力してください'; return; }
  errEl.textContent = '';
  document.getElementById('yt-ph').classList.add('gone');
  closeModal();

  if (ytPlayer && ytPlayer.loadVideoById) {
    ytPlayer.loadVideoById(vid);
  } else {
    ytPlayer = new YT.Player('yt-player', {
      videoId: vid,
      playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
      events: { onReady: onYTReady, onStateChange: onYTState }
    });
  }
}

function onYTReady() {
  ytDuration = ytPlayer.getDuration();
  if (ytDuration) document.getElementById('dur-label').textContent = fmtTime(ytDuration);
  startYTMonitor();
}
function onYTState(e) {
  if (e.data === YT.PlayerState.PLAYING)
    ytDuration = ytPlayer.getDuration() || ytDuration;
}

/* AB リピート */
function toggleLoop() {
  ytLooping = !ytLooping;
  document.getElementById('loop-btn').classList.toggle('active', ytLooping);
  var badge = document.getElementById('ab-badge');
  badge.textContent = ytLooping ? 'AB ON' : 'AB';
  badge.classList.toggle('on', ytLooping);
  if (ytLooping && ytPlayer) {
    ytPlayer.seekTo(parseTime(document.getElementById('start-time').value), true);
    ytPlayer.playVideo();
  }
  updateRegion();
}

/* 200ms ポーリング */
function startYTMonitor() {
  if (ytTimer) clearInterval(ytTimer);
  ytTimer = setInterval(function() {
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    var cur = ytPlayer.getCurrentTime();
    ytDuration = ytPlayer.getDuration() || ytDuration;

    document.getElementById('cur-time').textContent = fmtTime(cur);
    if (ytDuration) {
      document.getElementById('prog-fill').style.width = (cur / ytDuration * 100) + '%';
      document.getElementById('dur-label').textContent = fmtTime(ytDuration);
    }

    if (ytLooping) {
      var st = parseTime(document.getElementById('start-time').value);
      var enRaw = document.getElementById('end-time').value.trim();
      var en = enRaw ? parseTime(enRaw) : ytDuration;
      if (!en || en > ytDuration) en = ytDuration;
      if (st < en && (cur >= en || cur < st - 0.5)) ytPlayer.seekTo(st, true);
    }
  }, 200);
}

/* プログレスバーでシーク */
function seekByClick(e) {
  if (!ytPlayer || !ytDuration) return;
  var r = document.getElementById('prog-track').getBoundingClientRect();
  ytPlayer.seekTo(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * ytDuration, true);
}

/* AB 区間帯を更新 */
function updateRegion() {
  if (!ytDuration) return;
  var st = parseTime(document.getElementById('start-time').value);
  var enRaw = document.getElementById('end-time').value.trim();
  var en = enRaw ? parseTime(enRaw) : ytDuration;
  if (!en || en > ytDuration) en = ytDuration;
  var reg = document.getElementById('prog-region');
  reg.style.left  = (st / ytDuration * 100) + '%';
  reg.style.width = Math.max(0, (en - st) / ytDuration * 100) + '%';
}
['start-time', 'end-time'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', updateRegion);
});
document.getElementById('url-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadVideo();
});


/* ═══════════════════════════════════════════════
   遅延ミラー
   ═══════════════════════════════════════════════ */
var camStream   = null;
var camRunning  = false;
var capInterval = null;
var rafId       = null;
var frameBuf    = [];
var delaySec    = 10;
var mirrored    = true;
var facingMode  = 'user';   /* インカメ */
var CAPTURE_MS  = 80;

var liveVideo = document.getElementById('liveVideo');
var camCanvas = document.getElementById('cam-canvas');
var camCtx    = camCanvas.getContext('2d');
var capCanvas = document.createElement('canvas');
var capCtx    = capCanvas.getContext('2d');

/* キャンバスサイズをDOM表示サイズに合わせる */
function resizeCam() {
  var r = camCanvas.getBoundingClientRect();
  camCanvas.width  = Math.round(r.width)  || 1;
  camCanvas.height = Math.round(r.height) || 1;
}
window.addEventListener('resize', resizeCam);
/* 初回リサイズ：DOM確定後に実行 */
requestAnimationFrame(function(){ requestAnimationFrame(resizeCam); });

/* 反転トグル */
function toggleMirror() {
  mirrored = !mirrored;
  var btn = document.getElementById('mirror-btn');
  btn.classList.toggle('active', mirrored);
  btn.textContent = mirrored ? '反転 ON' : '反転';
}
/* 初期状態：反転 ON */
document.getElementById('mirror-btn').classList.add('active');
document.getElementById('mirror-btn').textContent = '反転 ON';

/* カメラ前後切替 */
function switchCamera() {
  if (!camRunning) return;
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  stopCamera(); startCamera();
}

/* 開始 / 停止トグル */
function toggleCamera() {
  camRunning ? stopCamera() : startCamera();
}

/* カメラ起動 */
async function startCamera() {
  document.getElementById('cam-err').textContent = '';
  try {
    /* 横画面インカメ → landscape 優先で要求 */
    camStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: facingMode,
        width:  { ideal: 1280 },
        height: { ideal: 720  }
      },
      audio: false
    });
    liveVideo.srcObject = camStream;
    await liveVideo.play();

    frameBuf = [];
    resizeCam();
    capInterval = setInterval(captureFrame, CAPTURE_MS);
    rafId = requestAnimationFrame(drawLoop);
    camRunning = true;

    document.getElementById('cam-ov').classList.add('gone');
    document.getElementById('delay-ov').classList.add('show');
    var btn = document.getElementById('cam-btn');
    btn.textContent = '■ 停止';
    btn.className = 'hbtn stop';
  } catch (err) {
    var msg = 'カメラを起動できませんでした';
    if (err.name === 'NotAllowedError') msg = 'カメラの許可が必要です';
    else if (err.name === 'NotFoundError') msg = 'カメラが見つかりません';
    document.getElementById('cam-err').textContent = msg;
  }
}

/* カメラ停止 */
function stopCamera() {
  camRunning = false;
  if (capInterval) { clearInterval(capInterval); capInterval = null; }
  if (rafId)       { cancelAnimationFrame(rafId); rafId = null; }
  if (camStream)   { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  liveVideo.srcObject = null;
  frameBuf = [];
  camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);

  document.getElementById('cam-ov').classList.remove('gone');
  document.getElementById('delay-ov').classList.remove('show');
  var btn = document.getElementById('cam-btn');
  btn.textContent = '● 開始';
  btn.className = 'hbtn go';
}

/* フレームをバッファに積む（480px相当に縮小してメモリ節約） */
function captureFrame() {
  if (!camRunning) return;
  var vw = liveVideo.videoWidth, vh = liveVideo.videoHeight;
  if (!vw || !vh) return;

  var maxDim = 480;
  if (vw >= vh) {
    capCanvas.width  = maxDim;
    capCanvas.height = Math.round(maxDim * vh / vw);
  } else {
    capCanvas.width  = Math.round(maxDim * vw / vh);
    capCanvas.height = maxDim;
  }
  capCtx.drawImage(liveVideo, 0, 0, capCanvas.width, capCanvas.height);

  var img = new Image();
  img.src = capCanvas.toDataURL('image/jpeg', 0.65);
  frameBuf.push({ t: Date.now(), img: img });

  /* 古いフレームを破棄 */
  var cutoff = Date.now() - (delaySec + 6) * 1000;
  while (frameBuf.length && frameBuf[0].t < cutoff) frameBuf.shift();
}

/* 遅延フレームを描画 */
function drawLoop() {
  rafId = requestAnimationFrame(drawLoop);
  if (!camRunning || !frameBuf.length) return;

  var target = Date.now() - delaySec * 1000;
  var frame  = frameBuf[0];
  for (var i = frameBuf.length - 1; i >= 0; i--) {
    if (frameBuf[i].t <= target) { frame = frameBuf[i]; break; }
  }
  if (!frame || !frame.img.complete || !frame.img.naturalWidth) return;

  var cw = camCanvas.width, ch = camCanvas.height;
  if (!cw || !ch) return;
  var fw = frame.img.naturalWidth, fh = frame.img.naturalHeight;

  /* キャンバス全体に収まる最大スケール */
  var scale = Math.min(cw / fw, ch / fh);

  camCtx.clearRect(0, 0, cw, ch);
  camCtx.save();
  camCtx.translate(cw / 2, ch / 2);
  if (mirrored) camCtx.scale(-1, 1);
  camCtx.drawImage(frame.img, -fw * scale / 2, -fh * scale / 2, fw * scale, fh * scale);
  camCtx.restore();
}

/* 遅延スライダー */
document.getElementById('delay-slider').addEventListener('input', function(e) {
  delaySec = parseInt(e.target.value);
  document.getElementById('delay-val').textContent    = delaySec + 's';
  document.getElementById('delay-ov-txt').textContent = delaySec + 's 遅延';
});

window.addEventListener('beforeunload', stopCamera);


/* ═══════════════════════════════════════════════
   ユーティリティ
   ═══════════════════════════════════════════════ */
function parseTime(str) {
  if (!str) return 0;
  str = str.trim();
  if (/^\d+(\.\d+)?$/.test(str)) return parseFloat(str);
  var p = str.split(':').map(Number);
  if (p.length === 2) return p[0] * 60 + p[1];
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return 0;
}
function fmtTime(sec) {
  sec = Math.floor(sec || 0);
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  return h > 0 ? h + ':' + pad(m) + ':' + pad(s) : m + ':' + pad(s);
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
